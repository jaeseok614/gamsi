name: Bug Report
description: Report a reproducible WorkGuard defect.
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What broke?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction Steps
      description: List the shortest path to reproduce the issue.
      placeholder: |
        1. Log in as ...
        2. Open ...
        3. Click ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: input
    id: validation
    attributes:
      label: Validation Command
      placeholder: npm run lint, npm run build, npm run qa:e2e:docker
