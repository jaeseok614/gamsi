<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>워크가드 오프라인</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f9fafb;
        color: #111827;
        font-family: Pretendard, Inter, "Noto Sans KR", sans-serif;
      }

      main {
        width: min(520px, calc(100% - 32px));
        border: 1px solid #e5e7eb;
        border-radius: 18px;
        background: #ffffff;
        padding: 28px;
        box-shadow: 0 24px 80px rgba(17, 24, 39, 0.08);
      }

      h1 {
        margin: 0 0 12px;
        color: #1e3a8a;
        font-size: 28px;
      }

      p {
        margin: 0 0 12px;
        line-height: 1.7;
      }

      a {
        color: #1e3a8a;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>오프라인 상태입니다.</h1>
      <p>최근에 열어본 화면과 설치된 앱 셸은 다시 열 수 있지만, 출퇴근 기록과 승인 처리는 네트워크가 복구된 뒤에 진행됩니다.</p>
      <p>연결이 복구되면 <a href="/dashboard">대시보드</a>로 돌아가 다시 시도하세요.</p>
    </main>
  </body>
</html>
